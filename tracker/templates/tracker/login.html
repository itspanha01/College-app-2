{% extends 'tracker/base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-lg" style="border-radius: 20px; overflow: hidden;">

            <!-- Top Banner -->
            <div style="background: linear-gradient(135deg, #1a73e8, #0d47a1); padding: 40px 20px; text-align: center;">
                <div style="font-size: 3rem;">🎓</div>
                <h2 style="color: white; font-weight: 700; margin: 10px 0 5px;">Welcome Back</h2>
                <p style="color: rgba(255,255,255,0.75); margin: 0;">Log in to continue your journey</p>
            </div>

            <!-- Form -->
            <div class="card-body p-5">
                <form method="POST">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-500" style="color: #444;">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}"
                               name="{{ field.html_name }}"
                               class="form-control form-control-lg"
                               style="border-radius: 12px; border: 1.5px solid #dde3ef; padding: 12px 16px;"
                               placeholder="Enter your {{ field.label|lower }}"
                               {% if field.value %}value="{{ field.value }}"{% endif %}>
                        {% if field.errors %}
                        <div style="color: #e53935; font-size: 0.85rem; margin-top: 5px;">{{ field.errors|join:", " }}</div>
                        {% endif %}
                    </div>
                    {% endfor %}

                    <button type="submit" class="btn btn-primary w-100 py-3 mt-2"
                            style="border-radius: 12px; font-size: 1rem; font-weight: 600; background: linear-gradient(135deg, #1a73e8, #0d47a1); border: none;">
                        Log In →
                    </button>
                </form>

                <div style="text-align: center; margin-top: 24px; color: #888;">
                    Don't have an account?
                    <a href="{% url 'signup' %}" style="color: #1a73e8; font-weight: 600; text-decoration: none;">Sign up for free</a>
                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
